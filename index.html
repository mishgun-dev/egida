    <script src="https://st.max.ru/js/max-web-app.js"></script>
    <script>
      if (window.WebApp) {
        // Инициализация пользователя
        if (window.WebApp.initDataUnsafe && window.WebApp.initDataUnsafe.user) {
          let maxUserId = window.WebApp.initDataUnsafe.user.id;
          let currentUrl = new URL(window.location.href);
          currentUrl.searchParams.set("max_id", maxUserId);
          window.history.replaceState(null, "", currentUrl.toString());
        }

        // Сообщаем мессенджеру, что окно загружено, и разворачиваем на весь экран
        if (typeof window.WebApp.ready === "function") window.WebApp.ready();
        if (typeof window.WebApp.expand === "function") window.WebApp.expand();

        // Принудительно транслируем параметры темы мессенджера в наши CSS-переменные
        if (window.WebApp.themeParams) {
          const applyTheme = () => {
            const tp = window.WebApp.themeParams;
            const set = (key, val) => {
              if (val) document.documentElement.style.setProperty(key, val);
            };

            // Маппинг цветов мессенджера на нашу дизайн-систему
            set("--app-bg", tp.bg_color);
            set("--app-text", tp.text_color);
            set("--app-btn-border", tp.button_color || tp.text_color);
            set("--app-btn-hover-bg", tp.button_color || tp.text_color);
            set("--app-btn-hover-text", tp.button_text_color || tp.bg_color);
            set("--app-dialog-bg", tp.secondary_bg_color || tp.bg_color);
            set("--app-dialog-text", tp.text_color);
            set("--app-card-border", tp.text_color);
          };
          applyTheme();
          // Если тема меняется динамически на лету
          if (typeof window.WebApp.onEvent === "function") {
            window.WebApp.onEvent("themeChanged", applyTheme);
          }
        }
      }
    </script>
